  <body>
     
    
        <section class="Form ">       
            <div class="container">
            <div class="row g-0">
                <div class="col-lg-9">
                    <h3>AK Travels</h3>
                <img src=".//assets/images/Capture.JPG" alt="Loading....." class="image-fluid" width="700" height="450">
                </div>

                 <button type="button" class="btn btn-warning button2">Sign Up</button>
                 <h3 class="sign-h">Sign In</h3>
                 <form action="GET">
                     <div class="form-group">
                         <input type="email" placeholder="Email" class="form-control px-4" required>
                     </div>
                     <div class="form-group">
                         <input type="password" placeholder="Password" class="form-control px-4" required>
                     </div>
                     <div class="form-group">
                         <button type="submit" class="btn btn-warning" >Submit</button>
                     </div>
                     <p class="pg">
                         Don't have an account?<a href="#" > Sign Up</a>
                     </p>
                 </form>
                </div>
            </div>
        </div>
     </section>
